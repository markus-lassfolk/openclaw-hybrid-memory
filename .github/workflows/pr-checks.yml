name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  size-label:
    name: Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Add size label
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            })

            const changes = files.reduce((sum, f) => sum + f.additions + f.deletions, 0)

            let size
            if (changes <= 10) size = 'XS'
            else if (changes <= 50) size = 'S'
            else if (changes <= 200) size = 'M'
            else if (changes <= 500) size = 'L'
            else size = 'XL'

            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL']

            // Ensure labels exist
            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const existingNames = repoLabels.map(l => l.name)
            const colors = { XS: 'c2e0c6', S: '0e8a16', M: 'fbca04', L: 'e4e669', XL: 'd93f0b' }

            for (const sl of sizeLabels) {
              if (!existingNames.includes(sl)) {
                const key = sl.replace('size/', '')
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: sl,
                    color: colors[key] || '0075ca',
                  })
                } catch (_) {}
              }
            }

            // Remove old size labels
            const prLabels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            for (const label of prLabels.filter(l => l.name.startsWith('size/'))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: label.name,
              })
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [`size/${size}`],
            })

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert

  changed-files-summary:
    name: Changed Files Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Post changed files comment
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            })

            const categories = {
              'Source': [],
              'Tests': [],
              'Config': [],
              'Workflows': [],
              'Docs': [],
              'Other': [],
            }

            for (const file of files) {
              const name = file.filename
              if (name.includes('/tests/') || name.endsWith('.test.ts')) {
                categories['Tests'].push(name)
              } else if (name.includes('.github/workflows/')) {
                categories['Workflows'].push(name)
              } else if (name.endsWith('.ts') || name.endsWith('.js') || name.endsWith('.mjs')) {
                categories['Source'].push(name)
              } else if (name.endsWith('.md')) {
                categories['Docs'].push(name)
              } else if (
                name.endsWith('.json') ||
                name.endsWith('.yml') ||
                name.endsWith('.yaml') ||
                name.endsWith('.prettierrc') ||
                name.endsWith('.prettierignore')
              ) {
                categories['Config'].push(name)
              } else {
                categories['Other'].push(name)
              }
            }

            let body = '## Changed Files Summary\n\n'
            for (const [cat, catFiles] of Object.entries(categories)) {
              if (catFiles.length > 0) {
                body += `### ${cat} (${catFiles.length})\n`
                body += catFiles.map(f => `- \`${f}\``).join('\n') + '\n\n'
              }
            }
            body += `\n**Total:** ${files.length} files changed`

            // Update existing bot comment or create new one
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('## Changed Files Summary'),
            )

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
