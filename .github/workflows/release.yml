name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v2026.03.01)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    needs: [ci]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine version tag
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${INPUT_VERSION}" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-npm:
    name: Publish to NPM
    needs: [release]
    runs-on: ubuntu-latest
    # Required for NPM Trusted Publishing (OIDC) - no long-lived tokens needed
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: extensions/memory-hybrid
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get version from tag
        id: version
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Set package version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version --no-git-tag-version "$VERSION"
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-24-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Verify publish
        run: npm run verify:publish
      # Trusted Publishing: npm CLI uses OIDC token from GitHub; no NPM_TOKEN secret needed
      - name: Publish to NPM
        run: npm publish --provenance --access public

  publish-npm-install:
    name: Publish openclaw-hybrid-memory-install to NPM
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set package version
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${TAG#v}"
          CURRENT=$(node -p "require('./packages/openclaw-hybrid-memory-install/package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            cd packages/openclaw-hybrid-memory-install && npm version --no-git-tag-version "$VERSION"
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to NPM
        working-directory: packages/openclaw-hybrid-memory-install
        run: npm publish --provenance --access public
