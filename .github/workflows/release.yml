# Release: GitHub Release body = release-notes/release-notes-<version>.md (preferred),
# docs/RELEASE-NOTES-<version>.md (legacy), plus matching CHANGELOG.md section; publishes to npm.
# - Tag push (v*): run appears under the tag in Actions (change branch filter to "All" or the tag).
# - Manual run: Actions → Release → "Run workflow", enter version (e.g. v2026.3.180), use branch main.
# - After CI succeeds on main, tag-release-after-ci.yml may push v* if missing, then **workflow_dispatch**
#   this workflow if the GitHub Release is still missing (token pushes do not trigger `on: push: tags`).
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v2026.3.180)'
        required: true
  push:
    tags:
      - 'v*'

concurrency:
  group: release-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    needs: [ci]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version tag
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${INPUT_VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Build release body (release notes + CHANGELOG)
        id: prep
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import re

          ver = os.environ["VERSION"]
          root = pathlib.Path(".")
          paths = [
              root / "release-notes" / f"release-notes-{ver}.md",
              root / "docs" / f"RELEASE-NOTES-{ver}.md",
          ]
          base = ""
          for p in paths:
              if p.is_file():
                  base = p.read_text(encoding="utf-8").strip()
                  break

          section = ""
          cl = root / "CHANGELOG.md"
          if cl.is_file():
              text = cl.read_text(encoding="utf-8")
              m = re.search(
                  rf"^## \[{re.escape(ver)}\].*?(?=^## \[|\Z)",
                  text,
                  flags=re.MULTILINE | re.DOTALL,
              )
              if m:
                  section = m.group(0).strip()

          parts = []
          if base:
              parts.append(base)
          if section:
              parts.append(
                  "---\n\n## Changelog ([Keep a Changelog](https://keepachangelog.com/))\n\n" + section
              )

          out = pathlib.Path("/tmp/gh-release-body.md")
          out.write_text("\n\n".join(parts) + "\n" if parts else "", encoding="utf-8")

          gh = os.environ["GITHUB_OUTPUT"]
          has = "true" if parts else "false"
          with open(gh, "a", encoding="utf-8") as f:
              f.write(f"has_body={has}\n")
          PY
      - name: Create GitHub Release (combined body)
        if: steps.prep.outputs.has_body == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: /tmp/gh-release-body.md
          generate_release_notes: false
          draft: false
          prerelease: false
      - name: Create GitHub Release (GitHub-generated notes)
        if: steps.prep.outputs.has_body != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-npm:
    name: Publish to NPM
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: extensions/memory-hybrid
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from tag
        id: version
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Set package version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version --no-git-tag-version "$VERSION"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-24-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Verify publish
        run: npm run verify:publish
      - name: Publish to NPM
        run: npm publish --provenance --access public

  publish-npm-install:
    name: Publish openclaw-hybrid-memory-install to NPM
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set package version
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${TAG#v}"
          CURRENT=$(node -p "require('./packages/openclaw-hybrid-memory-install/package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            cd packages/openclaw-hybrid-memory-install && npm version --no-git-tag-version "$VERSION"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to NPM
        working-directory: packages/openclaw-hybrid-memory-install
        run: npm publish --provenance --access public
