# Minimal GitHub Actions trigger — PR merged
# Nothing here calls external services or needs secrets
# OpenClaw polls for merged PRs instead (see cron job: verify-merged-prs)
name: PR Merged Trigger

on:
  pull_request:
    types: [closed]

jobs:
  merged-event:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "PR #${{ github.event.pull_request.number }} merged"
          echo "OpenClaw will pick this up on next verify-merged-prs cron run"
