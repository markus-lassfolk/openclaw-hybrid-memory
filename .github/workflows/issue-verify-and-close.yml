name: Issue Verify and Close

on:
  pull_request:
    types: [closed]

env:
  # Deep thinking model for verification — use o3 (deep reasoning) before human review
  # Falls back to gpt-5.4 if o3 is unavailable (respects Azure Foundry fallback chain)
  VERIFY_MODEL: "azure-foundry/o3"

jobs:
  # ===== PHASE 1: Automated Checks =====
  automated-checks:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.extract.outputs.issues }}
      pr_body: ${{ steps.pr-info.outputs.body }}
      pr_title: ${{ steps.pr-info.outputs.title }}
      pr_number: ${{ github.event.pull_request.number }}
    steps:
      - name: Extract PR info
        id: pr-info
        run: |
          echo "body=${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT

      - name: Extract linked issues
        id: extract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Extract issue numbers from PR body and title
          # Only look for genuine close/fix/resolve keywords
          KEYWORD_PATTERN='[Ff]ix(es|ed)?|[Cc]lose(s|d)?|[Rr]esolve(s|d)?|[Ii]mplement(s|ed|ation)?'
          
          # Extract from body
          BODY_ISSUES=$(echo "$PR_BODY" | \
            grep -oE "${KEYWORD_PATTERN}\s+#([0-9]+)" | \
            grep -oE '#([0-9]+)' | sed 's/#//' | sort -u | tr '\n' ' ')
          
          # Extract from title
          TITLE_ISSUES=$(echo "$PR_TITLE" | \
            grep -oE "${KEYWORD_PATTERN}\s+#([0-9]+)" | \
            grep -oE '#([0-9]+)' | sed 's/#//' | sort -u | tr '\n' ' ')
          
          # Combine and dedupe
          ALL=$(echo "$BODY_ISSUES $TITLE_ISSUES" | tr ' ' '\n' | grep -v '^$' | sort -u | tr '\n' ' ')
          
          echo "Issues from body: $BODY_ISSUES"
          echo "Issues from title: $TITLE_ISSUES"
          echo "All linked: $ALL"
          echo "issues=$ALL" >> $GITHUB_OUTPUT

      - name: No linked issues
        if: steps.extract.outputs.issues == ''
        run: |
          echo "No issues with close keywords found in PR body or title"
          echo "issues=" >> $GITHUB_OUTPUT

    # If no issues found, skip to end
    # If issues found, run automated checks then deep verification

  # ===== PHASE 2: Automated check per issue =====
  check-issue:
    if: github.event.pull_request.merged == true && needs.automated-checks.outputs.issues != ''
    needs: automated-checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        issue: ${{ fromJson(needs.automated-checks.outputs.issues) }}
    outputs:
      results: ${{ steps.check.outputs.results }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check issue vs PR
        id: check
        env:
          ISSUE: ${{ matrix.issue }}
          PR_BODY: ${{ needs.automated-checks.outputs.pr_body }}
          PR_TITLE: ${{ needs.automated-checks.outputs.pr_title }}
          PR_NUMBER: ${{ needs.automated-checks.outputs.pr_number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          ISSUE_DATA=$(gh api repos/$REPO/issues/$ISSUE --jq '{
            title: .title,
            body: .body,
            state: .state,
            labels: [.labels[].name],
            number: .number
          }')

          ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // empty')
          ISSUE_STATE=$(echo "$ISSUE_DATA" | jq -r '.state')
          ISSUE_LABELS=$(echo "$ISSUE_DATA" | jq -r '.labels | join(", ")')
          
          echo "=== Issue #$ISSUE ==="
          echo "Title: $ISSUE_TITLE"
          echo "State: $ISSUE_STATE"
          echo "Labels: $ISSUE_LABELS"
          echo ""

          # Already closed — skip
          if [ "$ISSUE_STATE" = "closed" ]; then
            echo "Already closed — skipping"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ===== Automated checks =====

          # 1. PR title references issue
          PR_REFS_ISSUE=$(echo "$PR_TITLE" | grep -cE "#$ISSUE" || echo "0")
          echo "Check 1 - PR title references #$ISSUE: $PR_REFS_ISSUE"

          # 2. Key term overlap (nouns from issue title in PR body)
          KEYWORDS=$(echo "$ISSUE_TITLE" | \
            grep -oE '[A-Z][a-z]+' | \
            grep -viE '^(The|This|That|Each|All|What|How|Why|When|feat|Fix|Bug|Enhancement|Issue|Feature|Implements?)$' | \
            head -6 | tr '\n' ' ')
          echo "Key terms from issue: $KEYWORDS"
          
          MATCH_COUNT=0
          for KW in $KEYWORDS; do
            if echo "$PR_BODY" | grep -qi "$KW"; then
              MATCH_COUNT=$((MATCH_COUNT + 1))
            fi
          done
          echo "Check 2 - Term overlap: $MATCH_COUNT/$(echo $KEYWORDS | wc -w)"
          
          # 3. Issue has acceptance criteria
          HAS_CRITERIA=$(echo "$ISSUE_BODY" | grep -cE "(TODO|Acceptance|Criteria|Verify|Must|Should|After this|done|complete)" || echo "0")
          echo "Check 3 - Acceptance criteria: $HAS_CRITERIA found"

          # 4. PR mentions tests
          HAS_TESTS=$(echo "$PR_BODY" | grep -cE "(test|Test|passing|failing)" || echo "0")
          echo "Check 4 - Test mention: $HAS_TESTS"

          # 5. PR has a summary section
          HAS_SUMMARY=$(echo "$PR_BODY" | grep -cE "## (What|Changes|Summary|Implementation)" || echo "0")
          echo "Check 5 - Summary section: $HAS_SUMMARY"

          # Build JSON result
          RESULTS=$(cat << EOF
          {
            "issue": $ISSUE,
            "pr_refs": $PR_REFS_ISSUE,
            "term_overlap": $MATCH_COUNT,
            "term_total": $(echo $KEYWORDS | wc -w),
            "criteria_found": $HAS_CRITERIA,
            "tests_mentioned": $HAS_TESTS,
            "has_summary": $HAS_SUMMARY,
            "issue_title": $(echo "$ISSUE_TITLE" | jq -Rs .),
            "pr_title": $(echo "$PR_TITLE" | jq -Rs .),
            "issue_body": $(echo "$ISSUE_BODY" | jq -Rs .)
          }
          EOF
          )
          echo "results=$RESULTS" >> $GITHUB_OUTPUT

  # ===== PHASE 3: Deep Thinking Verification =====
  # Only runs if automated checks raise concerns
  # Uses a reasoning model to actually evaluate whether PR addresses the issue
  deep-verify:
    if: github.event.pull_request.merged == true && needs.automated-checks.outputs.issues != ''
    needs: [automated-checks, check-issue]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      verdicts: ${{ steps.think.outputs.verdicts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deep think
        id: think
        env:
          PR_BODY: ${{ needs.automated-checks.outputs.pr_body }}
          PR_TITLE: ${{ needs.automated-checks.outputs.pr_title }}
          PR_NUMBER: ${{ needs.automated-checks.outputs.pr_number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_MODEL: ${{ env.VERIFY_MODEL }}
        run: |
          set -e
          
          echo "=== Phase 3: Deep Thinking Verification ==="
          echo "Using model: $VERIFY_MODEL"
          echo ""
          
          # Collect all check results
          CHECK_RESULTS='${{ needs.check-issue.outputs.results }}'
          
          # Build analysis prompt for the model
          cat > /tmp/verify-prompt.txt << 'PROMPT_END'
          You are verifying whether a PR actually addresses an issue. Your job is to reason deeply about this — not just pattern-match.

          CONTEXT:
          - PR title: "TITLE_PLACEHOLDER"
          - PR body: "BODY_PLACEHOLDER"
          - Automated check results for the linked issue: CHECK_RESULTS_PLACEHOLDER

          YOUR TASK:
          For each issue linked to this PR:
          1. Read the issue title and body carefully
          2. Read what the PR actually changed (from the PR body description)
          3. Reason about whether the PR substantively addresses the issue's intent
          4. Consider: does the PR solve the core problem, not just check boxes?
          5. If there are gaps, can you determine how significant they are?

          IMPORTANT: You must close the issue if:
          - The PR's core implementation matches the issue's intent
          - Any minor gaps are documented and non-blocking

          Only leave open if:
          - The PR is clearly unrelated to the issue
          - A critical feature is completely missing
          - There's a fundamental misunderstanding of the requirements

          Respond with ONLY valid JSON (no markdown, no explanation):
          {
            "verdicts": [
              {
                "issue": <number>,
                "reasoning": "<2-3 sentence explanation of your thinking>",
                "verdict": "close" or "review",
                "confidence": "high" or "medium" or "low",
                "gap_description": "<what's missing if verdict is review, else null>"
              }
            ]
          }
          PROMPT_END

          # Replace placeholders
          TITLE_ESC=$(echo "$PR_TITLE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          BODY_ESC=$(echo "$PR_BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          
          # Use Azure Foundry API for deep reasoning
          AZURE_KEY=$(gh api repos/$REPO/actions/secrets/VERIFY_AZURE_KEY --jq '.encrypted_value' 2>/dev/null || echo "")
          
          echo "Calling $VERIFY_MODEL for deep verification..."
          
          RESPONSE=$(curl -s -X POST \
            "https://rnd-7465-resource.services.ai.azure.com/openai/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "api-key: ${VERIFY_AZURE_API_KEY:-$(echo $AZURE_KEY | base64 -d 2>/dev/null || echo '')}" \
            -d "$(cat << EOF
          {
            "model": "o3",
            "messages": [
              {
                "role": "system",
                "content": "You are a careful code reviewer. Reason about whether this PR addresses the linked issue. Output ONLY valid JSON."
              },
              {
                "role": "user", 
                "content": "PR Title: $PR_TITLE\n\nPR Body: $PR_BODY\n\nAutomated Check Results: $CHECK_RESULTS\n\nVerify each issue carefully. Output JSON only."
              }
            ],
            "max_completion_tokens": 4000
          }
          EOF
          )" 2>/dev/null || echo '{"choices":[{"message":{"content":"{\"verdicts\":[]}"}}]}')

          VERDICTS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(json.dumps(d))
except:
    print('{\"verdicts\":[]}')
" 2>/dev/null)
          
          echo "Verdicts: $VERDICTS"
          echo "verdicts=$VERDICTS" >> $GITHUB_OUTPUT

  # ===== PHASE 4: Action (close or flag for human) =====
  resolve-issues:
    if: github.event.pull_request.merged == true && needs.automated-checks.outputs.issues != ''
    needs: [automated-checks, check-issue, deep-verify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve each issue
        env:
          PR_NUMBER: ${{ needs.automated-checks.outputs.pr_number }}
          PR_TITLE: ${{ needs.automated-checks.outputs.pr_title }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERDICTS: ${{ needs.deep-verify.outputs.verdicts }}
        run: |
          set -e
          
          echo "=== Phase 4: Resolving Issues ==="
          
          # Parse verdicts
          echo "Verdicts from deep-verify:"
          echo "$VERDICTS" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    for v in d.get('verdicts', []):
        print(f\"  Issue #{v.get('issue')}: {v.get('verdict')} ({v.get('confidence')}) — {v.get('reasoning','')[:80]}\")
except Exception as e:
    print(f'Failed to parse: {e}')
    print('Input:', sys.stdin.read())
" 2>/dev/null || echo "No verdicts parsed"
          
          echo ""
          
          # Close or flag each issue
          echo "$VERDICTS" | python3 -c "
import sys, json, subprocess

d = json.load(sys.stdin)
GH_TOKEN = '$GH_TOKEN'
REPO = '$REPO'
PR_NUMBER = '$PR_NUMBER'
PR_TITLE = '$PR_TITLE'

for v in d.get('verdicts', []):
    issue = v.get('issue')
    verdict = v.get('verdict', 'review')
    reasoning = v.get('reasoning', '')
    confidence = v.get('confidence', 'medium')
    gap = v.get('gap_description')
    
    verdict_emoji = '✅' if verdict == 'close' else '⚠️'
    
    # Post comment with reasoning
    if verdict == 'close':
        comment = f\"\"\"## PR #{PR_NUMBER} — Verification Complete {verdict_emoji}

**PR:** {PR_TITLE}  
**Verdict:** Close — {confidence} confidence

**Reasoning:** {reasoning}

This PR substantively addresses the issue. Closing.
\"\"\"
        cmd = f'gh api --method POST repos/{REPO}/issues/{issue}/comments --field body="{comment}"'
    else:
        comment = f\"\"\"## PR #{PR_NUMBER} — Manual Review Required {verdict_emoji}

**PR:** {PR_TITLE}  
**Verdict:** Flagged for review — {confidence} confidence

**Reasoning:** {reasoning}

{f'**Gap:** {gap}' if gap else ''}

The automated checks and deep verification identified concerns that need human judgment.
\"\"\"
        cmd = f'gh api --method POST repos/{REPO}/issues/{issue}/comments --field body="{comment}"'
    
    subprocess.run(cmd, shell=True)
    print(f'  Comment posted on issue #{issue}')
    
    # Close or leave open
    if verdict == 'close':
        close_cmd = f'gh issue close {issue} --repo {REPO} --reason completed'
        subprocess.run(close_cmd, shell=True)
        print(f'  ✅ Issue #{issue} closed')
    else:
        # Add needs-review label
        label_cmd = f'gh issue edit {issue} --repo {REPO} --add-label needs-review'
        subprocess.run(label_cmd, shell=True)
        print(f'  ⚠️  Issue #{issue} flagged — needs-review label added')
"

  # ===== PHASE 5: Summary =====
  summary:
    if: github.event.pull_request.merged == true
    needs: [automated-checks, resolve-issues]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          PR_NUMBER: ${{ needs.automated-checks.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          ISSUES='${{ needs.automated-checks.outputs.issues }}'
          if [ -z "$ISSUES" ] || [ "$ISSUES" = " " ]; then
            echo "No linked issues found in PR #$PR_NUMBER"
            echo "Add 'Fixes #XXX' or 'Closes #XXX' to your PR body to enable auto-close"
          else
            echo "Verification complete for PR #$PR_NUMBER"
            echo "Linked issues: $ISSUES"
            echo ""
            echo "Check GitHub Actions logs for detailed per-issue verdicts"
          fi
