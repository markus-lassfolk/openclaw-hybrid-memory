name: CI

on:
  push:
    branches:
      - main
      - 'bugfix/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'copilot-fix/**'
      - 'cursor-agent/**'
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege default for the GITHUB_TOKEN (explicit jobs may override).
# actions:write — required for actions/cache and actions/upload-artifact when permissions are explicit.
permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'workflow_call' && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_call'
        with:
          filters: |
            code:
              - 'extensions/memory-hybrid/**'
              - 'extensions/memory-hybrid/package*.json'
              - 'extensions/memory-hybrid/tsconfig*.json'
              - '.github/workflows/ci.yml'

  typecheck:
    name: Type Check (Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Type check
        run: cd extensions/memory-hybrid && npx tsc --noEmit

  lint:
    name: Lint (Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Lint
        run: cd extensions/memory-hybrid && npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run tests
        run: cd extensions/memory-hybrid && npm run test

  test-coverage:
    name: Test Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run tests with coverage
        run: cd extensions/memory-hybrid && npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: extensions/memory-hybrid/coverage/
          if-no-files-found: warn

  dead-code:
    name: Dead Code Analysis (knip)
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run knip
        run: cd extensions/memory-hybrid && npx knip --no-exit-code

  format-check:
    name: Format Check (Biome)
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm ci
      - name: Check formatting
        run: cd extensions/memory-hybrid && npm run format:check

  # Ensures package.json "files" covers all runtime imports (incl. cli → benchmark/).
  # Vitest always runs in a full checkout; this catches omissions visible only in npm pack.
  publish-invariants:
    name: Publish manifest (npm files[])
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: verify-publish invariants
        run: cd extensions/memory-hybrid && node scripts/verify-publish.cjs

  strict-typecheck:
    name: Strict TypeScript Check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Strict type check
        run: cd extensions/memory-hybrid && (npx tsc --noEmit -p tsconfig.strict.json || true)

  install-smoke:
    name: Install Smoke Test
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Pack and test install
        run: |
          cd extensions/memory-hybrid
          # Avoid picking a stale .tgz from a previous run (find | head -1 is non-deterministic).
          rm -f openclaw-hybrid-memory-*.tgz
          TARBALL=$(npm pack 2>&1 | grep '\.tgz$' | tail -1)
          test -n "$TARBALL" || { echo 'FAIL: npm pack did not report a .tgz filename'; exit 1; }
          TARBALL_PATH="$(pwd)/$TARBALL"
          mkdir -p /tmp/smoke-test && cd /tmp/smoke-test
          rm -rf node_modules package-lock.json
          npm init -y
          npm install "$TARBALL_PATH" --ignore-scripts
          node -e "const pkg = require('./node_modules/openclaw-hybrid-memory/package.json'); console.log('Import OK:', pkg.name, pkg.version)"
          test -f node_modules/openclaw-hybrid-memory/benchmark/shadow-eval.ts || \
            { echo 'FAIL: benchmark/shadow-eval.ts missing from npm pack (check package.json files[])'; exit 1; }

  lint-arch:
    name: Architectural Lint
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Run architectural lint
        run: cd extensions/memory-hybrid && npm run lint:arch

  # Passthrough jobs: satisfy required status checks when no code changes detected
  # (e.g. CI-only, docs, or dependency PRs where path filter skips the real jobs)
  typecheck-pass-22:
    name: Type Check (Node 22)
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"

  typecheck-pass-24:
    name: Type Check (Node 24)
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"

  lint-pass-22:
    name: Lint (Node 22)
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"

  lint-pass-24:
    name: Lint (Node 24)
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"

  test-pass-22:
    name: Test (Node 22)
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"

  test-pass-24:
    name: Test (Node 24)
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"

  publish-invariants-pass:
    name: Publish manifest (npm files[])
    needs: changes
    if: needs.changes.outputs.code != 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes detected — required check satisfied"
