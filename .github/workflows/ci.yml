name: CI

on:
  push:
    branches:
      - main
      - 'bugfix/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'copilot-fix/**'
      - 'cursor-agent/**'
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'workflow_call' && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_call'
        with:
          filters: |
            code:
              - 'extensions/memory-hybrid/src/**'
              - 'extensions/memory-hybrid/package*.json'
              - 'extensions/memory-hybrid/tsconfig*.json'
              - '.github/workflows/ci.yml'

  typecheck:
    name: Type Check (Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Type check
        run: cd extensions/memory-hybrid && npx tsc --noEmit

  lint:
    name: Lint (Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Lint
        run: cd extensions/memory-hybrid && npm run lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run tests
        run: cd extensions/memory-hybrid && npm run test

  test-coverage:
    name: Test Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run tests with coverage
        run: cd extensions/memory-hybrid && npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: extensions/memory-hybrid/coverage/
          if-no-files-found: warn

  duplicate-check:
    name: Duplicate Code Detection (jscpd)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run jscpd
        run: npx jscpd extensions/memory-hybrid/src --format typescript --min-lines 12 --min-tokens 80 --reporters console --gitignore

  dead-code:
    name: Dead Code Analysis (knip)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Run knip
        run: cd extensions/memory-hybrid && npx knip --no-exit-code

  format-check:
    name: Format Check (Prettier)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Check formatting
        run: cd extensions/memory-hybrid && npx prettier --check 'src/**/*.ts'

  strict-typecheck:
    name: Strict TypeScript Check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Strict type check
        run: cd extensions/memory-hybrid && npx tsc --noEmit -p tsconfig.strict.json

  install-smoke:
    name: Install Smoke Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: extensions/memory-hybrid/node_modules
          key: ${{ runner.os }}-node-22-${{ hashFiles('extensions/memory-hybrid/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-22-
      - name: Install dependencies
        run: cd extensions/memory-hybrid && npm install
      - name: Pack and test install
        run: |
          cd extensions/memory-hybrid
          npm pack
          TARBALL=$(ls openclaw-hybrid-memory-*.tgz | head -1)
          TARBALL_PATH="$(pwd)/$TARBALL"
          mkdir -p /tmp/smoke-test && cd /tmp/smoke-test
          npm init -y
          npm install "$TARBALL_PATH" --ignore-scripts
          node -e "const pkg = require('./node_modules/openclaw-hybrid-memory/package.json'); console.log('Import OK:', pkg.name, pkg.version)"

  lint-arch:
    name: Architectural Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Run architectural lint
        run: cd extensions/memory-hybrid && npm run lint:arch
