name: Bug Report
description: Report a bug in openclaw-hybrid-memory
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps that trigger the bug.
      placeholder: |
        1. Configure the plugin with ...
        2. Invoke the `memory_store` tool (or another plugin tool) with ...
        3. Observe error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens? Include full error messages and stack traces if available.
    validations:
      required: true

  - type: input
    id: openclaw-version
    attributes:
      label: OpenClaw Version
      description: Output of `openclaw --version` or the version from `package.json`
      placeholder: "0.x.x"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and version (e.g., Ubuntu 22.04, macOS 14, Windows 11)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: |
        Paste any relevant plugin configuration. **Redact all secrets, API keys, and credentials before submitting.**
      render: json
